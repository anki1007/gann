<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Gann &amp; Astro Terminal</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.26.4/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
<script>
  /* Force the classic JSX runtime (React.createElement) so no ESM import is emitted */
  Babel.registerPreset('react-classic', {
    presets: [[Babel.availablePresets['react'], { runtime: 'classic' }]]
  });

<style>
  :root{
    --bg:#070b11; --bg2:#0c121b; --panel:#0e1622; --panel2:#111c2b;
    --border:#1c2a3a; --border2:#26384d;
    --txt:#cdd9e5; --muted:#6b8199; --dim:#46586c;
    --grn:#36d399; --grn2:#0e3d2f; --amb:#f5b942; --amb2:#3d2f0e;
    --cyn:#48c6e8; --red:#f06a6a; --vio:#b98cff; --mag:#ff7ac6;
    --gridline:#16222f;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{
    background:var(--bg); color:var(--txt);
    font-family:'JetBrains Mono','SF Mono',ui-monospace,Menlo,Consolas,monospace;
    font-size:13px; line-height:1.45; overflow:hidden;
  }
  #root{height:100vh;}
  .app{display:flex;flex-direction:column;height:100vh;}
  /* top bar */
  .topbar{
    display:flex;align-items:center;gap:14px;padding:8px 14px;
    background:linear-gradient(180deg,#0c121b,#0a0f17);
    border-bottom:1px solid var(--border);flex:0 0 auto;
  }
  .brand{display:flex;align-items:center;gap:9px;font-weight:700;letter-spacing:.5px;white-space:nowrap;}
  .brand .dot{width:9px;height:9px;border-radius:50%;background:var(--grn);box-shadow:0 0 9px var(--grn);}
  .brand small{color:var(--muted);font-weight:400;letter-spacing:0;}
  .tb-spacer{flex:1;}
  .ctrl{display:flex;flex-direction:column;gap:2px;}
  .ctrl label{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.7px;}
  select,input{
    background:var(--bg2);border:1px solid var(--border2);color:var(--txt);
    font-family:inherit;font-size:13px;padding:5px 8px;border-radius:5px;outline:none;
  }
  select:focus,input:focus{border-color:var(--grn);}
  input[type=date]{color-scheme:dark;}
  .btn{
    background:var(--panel2);border:1px solid var(--border2);color:var(--txt);
    font-family:inherit;font-size:12px;padding:6px 11px;border-radius:5px;cursor:pointer;
    white-space:nowrap;transition:.12s;
  }
  .btn:hover{border-color:var(--grn);color:var(--grn);}
  .btn.sm{padding:3px 8px;font-size:11px;}
  .pricebox{color:var(--grn);font-weight:700;}
  .datasrc{font-size:10px;color:var(--dim);display:flex;align-items:center;gap:5px;}
  .led{width:7px;height:7px;border-radius:50%;background:var(--amb);}
  .led.live{background:var(--grn);box-shadow:0 0 7px var(--grn);}
  /* body */
  .main{display:flex;flex:1;min-height:0;}
  .sidebar{
    width:248px;flex:0 0 248px;background:var(--bg2);border-right:1px solid var(--border);
    overflow-y:auto;transition:margin-left .18s ease;
  }
  .sidebar.hidden{margin-left:-248px;}
  .sb-group{padding:6px 0;}
  .sb-title{
    padding:9px 14px 5px;font-size:10px;letter-spacing:1.2px;text-transform:uppercase;
    color:var(--amb);display:flex;align-items:center;gap:7px;
  }
  .sb-title::before{content:"";flex:1 0 12px;height:1px;background:var(--border);order:2;}
  .sb-title .chev{order:0;width:10px;font-size:9px;color:var(--amb);transition:.1s;}
  .sb-title .grpcount{order:3;color:var(--dim);font-weight:400;letter-spacing:0;font-size:9px;}
  .sb-title:hover{color:#ffd27a;}
  .sb-title:hover .chev{color:#ffd27a;}
  .sb-item{
    padding:6px 14px 6px 22px;cursor:pointer;color:var(--muted);
    border-left:2px solid transparent;display:flex;align-items:center;gap:8px;font-size:12.5px;
  }
  .sb-item:hover{background:var(--panel);color:var(--txt);}
  .sb-item.active{background:var(--panel2);color:var(--grn);border-left-color:var(--grn);}
  .sb-item .ic{width:16px;text-align:center;color:var(--dim);font-size:13px;}
  .sb-item.active .ic{color:var(--grn);}
  .content{flex:1;min-width:0;overflow-y:auto;padding:16px 20px 50px;}
  .reopen{
    position:absolute;left:0;top:120px;background:var(--panel2);border:1px solid var(--border2);
    border-left:none;border-radius:0 6px 6px 0;padding:10px 6px;cursor:pointer;color:var(--grn);
    writing-mode:vertical-rl;font-size:11px;letter-spacing:1px;z-index:5;
  }
  /* panels */
  .pg-head{margin:0 0 4px;font-size:18px;font-weight:700;letter-spacing:.3px;}
  .pg-head .sub{color:var(--grn);}
  .pg-desc{color:var(--muted);margin:0 0 16px;max-width:880px;font-size:12px;}
  .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:13px 15px;}
  .card h4{margin:0 0 8px;font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);font-weight:600;}
  .card .big{font-size:22px;font-weight:700;color:var(--txt);}
  .card .big.grn{color:var(--grn);} .card .big.amb{color:var(--amb);} .card .big.cyn{color:var(--cyn);}
  .panel{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:14px 16px;margin-bottom:14px;}
  .panel h3{margin:0 0 10px;font-size:13px;color:var(--amb);letter-spacing:.5px;text-transform:uppercase;font-weight:600;}
  .row{display:flex;flex-wrap:wrap;gap:14px;align-items:flex-end;margin-bottom:6px;}
  table{border-collapse:collapse;width:100%;font-size:12px;}
  th,td{padding:5px 9px;text-align:right;border-bottom:1px solid var(--gridline);white-space:nowrap;}
  th{color:var(--dim);font-weight:600;text-transform:uppercase;font-size:10px;letter-spacing:.6px;position:sticky;top:0;background:var(--panel);}
  td.l,th.l{text-align:left;}
  tr:hover td{background:var(--bg2);}
  .tag{display:inline-block;padding:1px 6px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:.4px;}
  .tag.res{background:var(--amb2);color:var(--amb);} .tag.sup{background:var(--grn2);color:var(--grn);}
  .tag.card{background:#13314a;color:var(--cyn);} .tag.retro{background:#3a1320;color:var(--red);}
  .pos{color:var(--grn);} .neg{color:var(--red);} .mut{color:var(--muted);} .cyn{color:var(--cyn);} .amb{color:var(--amb);} .vio{color:var(--vio);}
  .glyph{font-size:15px;}
  .scroll{max-height:560px;overflow:auto;}
  .legend{display:flex;flex-wrap:wrap;gap:14px;color:var(--muted);font-size:11px;margin-top:8px;}
  .legend span{display:flex;align-items:center;gap:5px;}
  .sw{width:11px;height:11px;border-radius:2px;display:inline-block;}
  .note{color:var(--dim);font-size:11px;margin-top:8px;}
  .kbd{background:var(--bg2);border:1px solid var(--border2);border-radius:3px;padding:0 5px;color:var(--cyn);}
  /* sq9 spiral */
  .spiral{border-collapse:collapse;margin:0 auto;}
  .spiral td{width:40px;height:34px;text-align:center;border:1px solid var(--gridline);font-size:11px;padding:0;color:var(--muted);}
  .spiral td.diag{background:#14233a;color:var(--cyn);}
  .spiral td.card{background:#0e2b22;color:var(--grn);}
  .spiral td.center{background:var(--amb);color:#000;font-weight:700;}
  .moon{width:74px;height:74px;border-radius:50%;background:#1a2636;position:relative;overflow:hidden;border:1px solid var(--border2);}
  .moon .lit{position:absolute;top:0;bottom:0;background:#e8eef5;}
  svg text{font-family:inherit;}
  .err{color:var(--red);}
  ::-webkit-scrollbar{width:10px;height:10px;}
  ::-webkit-scrollbar-thumb{background:#1c2a3a;border-radius:5px;}
  ::-webkit-scrollbar-track{background:transparent;}

  /* === UI polish (added) === */
  .btn.sm.on{border-color:var(--grn);color:var(--grn);background:var(--grn2);}
  .topbar{align-items:flex-end;}
  .topbar>.btn.sm:first-child{align-self:center;}
  .topbar .brand{align-self:center;}
  .topbar .datasrc{align-self:center;}
  .btn.sm{height:28px;display:inline-flex;align-items:center;justify-content:center;}
  .sb-item{color:#9fb1c6;}
  .sb-item .ic{color:#7d8ea3;}
  .sb-item:hover{background:#152433;color:#eef5ff;}
  .sb-item:hover .ic{color:#9fb1c6;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react-classic">
/* ===================== ENGINE (verified in Node) ===================== */
const DEG=Math.PI/180,R2D=180/Math.PI;
const sin=d=>Math.sin(d*DEG),cos=d=>Math.cos(d*DEG);
const atan2d=(y,x)=>Math.atan2(y,x)*R2D;
const rev=x=>{x=x%360;return x<0?x+360:x;};
const rev180=x=>{x=rev(x);return x>180?x-360:x;};
function dayNumber(y,m,D,ut=0){
  const d=367*y-Math.floor(7*(y+Math.floor((m+9)/12))/4)+Math.floor(275*m/9)+D-730530;
  return d+ut/24;
}
function dayNumberFromDate(dt){
  return dayNumber(dt.getUTCFullYear(),dt.getUTCMonth()+1,dt.getUTCDate(),
    dt.getUTCHours()+dt.getUTCMinutes()/60+dt.getUTCSeconds()/3600);
}
const ELEMENTS={
  Sun:d=>({N:0,i:0,w:282.9404+4.70935e-5*d,a:1.0,e:0.016709-1.151e-9*d,M:356.0470+0.9856002585*d}),
  Moon:d=>({N:125.1228-0.0529538083*d,i:5.1454,w:318.0634+0.1643573223*d,a:60.2666,e:0.054900,M:115.3654+13.0649929509*d}),
  Mercury:d=>({N:48.3313+3.24587e-5*d,i:7.0047+5.00e-8*d,w:29.1241+1.01444e-5*d,a:0.387098,e:0.205635+5.59e-10*d,M:168.6562+4.0923344368*d}),
  Venus:d=>({N:76.6799+2.46590e-5*d,i:3.3946+2.75e-8*d,w:54.8910+1.38374e-5*d,a:0.723330,e:0.006773-1.302e-9*d,M:48.0052+1.6021302244*d}),
  Mars:d=>({N:49.5574+2.11081e-5*d,i:1.8497-1.78e-8*d,w:286.5016+2.92961e-5*d,a:1.523688,e:0.093405+2.516e-9*d,M:18.6021+0.5240207766*d}),
  Jupiter:d=>({N:100.4542+2.76854e-5*d,i:1.3030-1.557e-7*d,w:273.8777+1.64505e-5*d,a:5.20256,e:0.048498+4.469e-9*d,M:19.8950+0.0830853001*d}),
  Saturn:d=>({N:113.6634+2.38980e-5*d,i:2.4886-1.081e-7*d,w:339.3939+2.97661e-5*d,a:9.55475,e:0.055546-9.499e-9*d,M:316.9670+0.0334442282*d}),
  Uranus:d=>({N:74.0005+1.3978e-5*d,i:0.7733+1.9e-8*d,w:96.6612+3.0565e-5*d,a:19.18171-1.55e-8*d,e:0.047318+7.45e-9*d,M:142.5905+0.011725806*d}),
  Neptune:d=>({N:131.7806+3.0173e-5*d,i:1.7700-2.55e-7*d,w:272.8461-6.027e-6*d,a:30.05826+3.313e-8*d,e:0.008606+2.15e-9*d,M:260.2471+0.005995147*d})
};
const PLANET_ORDER=['Sun','Moon','Mercury','Venus','Mars','Jupiter','Saturn','Uranus','Neptune'];
const GLYPH={Sun:'☉',Moon:'☽',Mercury:'☿',Venus:'♀',Mars:'♂',Jupiter:'♃',Saturn:'♄',Uranus:'♅',Neptune:'♆'};
const PCOLOR={Sun:'#f5b942',Moon:'#cdd9e5',Mercury:'#48c6e8',Venus:'#36d399',Mars:'#f06a6a',Jupiter:'#b98cff',Saturn:'#d8a24a',Uranus:'#5fd6c4',Neptune:'#7aa0ff'};
const ZODIAC=['Aries','Taurus','Gemini','Cancer','Leo','Virgo','Libra','Scorpio','Sagittarius','Capricorn','Aquarius','Pisces'];
const ZGLYPH=['♈','♉','♊','♋','♌','♍','♎','♏','♐','♑','♒','♓'];
function heliocentric(el){
  const e=el.e,M=rev(el.M);
  let E=M+R2D*e*sin(M)*(1+e*cos(M));
  for(let k=0;k<8;k++){const dE=(E-R2D*e*sin(E)-M)/(1-e*cos(E));E-=dE;if(Math.abs(dE)<1e-9)break;}
  const xv=el.a*(cos(E)-e),yv=el.a*Math.sqrt(1-e*e)*sin(E);
  const v=rev(atan2d(yv,xv)),r=Math.sqrt(xv*xv+yv*yv),vw=v+el.w;
  const xh=r*(cos(el.N)*cos(vw)-sin(el.N)*sin(vw)*cos(el.i));
  const yh=r*(sin(el.N)*cos(vw)+cos(el.N)*sin(vw)*cos(el.i));
  const zh=r*(sin(vw)*sin(el.i));
  return{xh,yh,zh,r,v,lonecl:rev(vw)};
}
const oblecl=d=>23.4393-3.563e-7*d;
function positionAt(name,d){
  const sunEl=ELEMENTS.Sun(d),sun=heliocentric(sunEl),ecl=oblecl(d);
  if(name==='Sun'){
    const lon=rev(atan2d(sun.yh,sun.xh)),lat=atan2d(0,Math.sqrt(sun.xh*sun.xh+sun.yh*sun.yh));
    return finishGeo(name,sun.xh,sun.yh,0,ecl,null,sun.r,lon,lat);
  } else if(name==='Moon'){
    const m=heliocentric(ELEMENTS.Moon(d));
    let lon=m.lonecl,lat=atan2d(m.zh,Math.sqrt(m.xh*m.xh+m.yh*m.yh));
    const Ms=rev(sunEl.M),ws=sunEl.w,mel=ELEMENTS.Moon(d),Mm=rev(mel.M),Nm=mel.N,wm=mel.w;
    const Ls=rev(Ms+ws),Lm=rev(Mm+wm+Nm),Dm=rev(Lm-Ls),F=rev(Lm-Nm);
    lon+=-1.274*sin(Mm-2*Dm)+0.658*sin(2*Dm)-0.186*sin(Ms)-0.059*sin(2*Mm-2*Dm)
      -0.057*sin(Mm-2*Dm+Ms)+0.053*sin(Mm+2*Dm)+0.046*sin(2*Dm-Ms)+0.041*sin(Mm-Ms)
      -0.035*sin(Dm)-0.031*sin(Mm+Ms)-0.015*sin(2*F-2*Dm)+0.011*sin(Mm-4*Dm);
    lat+=-0.173*sin(F-2*Dm)-0.055*sin(Mm-F-2*Dm)-0.046*sin(Mm+F-2*Dm)+0.033*sin(F+2*Dm)+0.017*sin(2*Mm+F);
    lon=rev(lon);const rr=m.r;
    const xg=rr*cos(lon)*cos(lat),yg=rr*sin(lon)*cos(lat),zg=rr*sin(lat);
    return finishGeo(name,xg,yg,zg,ecl,null,rr,lon,lat);
  } else {
    const p=heliocentric(ELEMENTS[name](d));
    const xg=p.xh+sun.xh,yg=p.yh+sun.yh,zg=p.zh;
    const lon=rev(atan2d(yg,xg)),lat=atan2d(zg,Math.sqrt(xg*xg+yg*yg));
    return finishGeo(name,xg,yg,zg,ecl,p.lonecl,p.r,lon,lat);
  }
}
function finishGeo(name,xg,yg,zg,ecl,helioLon,dist,lonecl,latecl){
  const xe=xg,ye=yg*cos(ecl)-zg*sin(ecl),ze=yg*sin(ecl)+zg*cos(ecl);
  const RA=rev(atan2d(ye,xe)),Dec=atan2d(ze,Math.sqrt(xe*xe+ye*ye));
  const si=Math.floor(rev(lonecl)/30);
  return{name,glyph:GLYPH[name],lon:rev(lonecl),lat:latecl,
    helioLon:helioLon==null?null:rev(helioLon),ra:RA,dec:Dec,dist,
    sign:ZODIAC[si],signGlyph:ZGLYPH[si],signDeg:rev(lonecl)-si*30};
}
function ephemeris(dt,bodies=PLANET_ORDER){
  const d=dayNumberFromDate(dt);
  return bodies.map(b=>{const p=positionAt(b,d);const p2=positionAt(b,d+1);
    p.speed=rev180(p2.lon-p.lon);p.retro=p.speed<0;return p;});
}
function moonPhase(dt){
  const d=dayNumberFromDate(dt),s=positionAt('Sun',d).lon,m=positionAt('Moon',d).lon;
  const elong=rev(m-s),illum=(1-cos(elong))/2;
  const names=['New Moon','Waxing Crescent','First Quarter','Waxing Gibbous','Full Moon','Waning Gibbous','Last Quarter','Waning Crescent'];
  return{elong,illum,phaseName:names[Math.floor((rev(elong)+22.5)/45)%8],age:elong/360*29.530588};
}
function nextMoonEvents(dt,count=8){
  const targets=[0,90,180,270],labels={0:'New Moon',90:'First Quarter',180:'Full Moon',270:'Last Quarter'};
  const out=[];let t=new Date(dt.getTime());const stepH=2;let prev=moonPhase(t).elong;
  const maxIter=Math.ceil(24*(count*8+20)/stepH);
  for(let i=0;i<maxIter&&out.length<count;i++){
    const t2=new Date(t.getTime()+stepH*3600*1000),cur=moonPhase(t2).elong;
    for(const tg of targets){let a=prev,b=cur;
      if(tg===0){if(a>180)a-=360;if(b>180)b-=360;}
      if(a<tg&&b>=tg){const frac=(tg-a)/(b-a);out.push({label:labels[tg],date:new Date(t.getTime()+frac*stepH*3600*1000)});}}
    t=t2;prev=cur;}
  return out.sort((x,y)=>x.date-y.date).slice(0,count);
}
const ASPECTS=[
  {name:'Conjunction',glyph:'☌',angle:0,orb:6,col:'#f5b942'},
  {name:'Sextile',glyph:'⚹',angle:60,orb:4,col:'#36d399'},
  {name:'Square',glyph:'□',angle:90,orb:5,col:'#f06a6a'},
  {name:'Trine',glyph:'△',angle:120,orb:5,col:'#48c6e8'},
  {name:'Opposition',glyph:'☍',angle:180,orb:6,col:'#b98cff'},
  {name:'Semisextile',glyph:'⚺',angle:30,orb:2,col:'#6b8199'},
  {name:'Semisquare',glyph:'∠',angle:45,orb:2,col:'#6b8199'},
  {name:'Sesquiquadrate',glyph:'⚼',angle:135,orb:2,col:'#6b8199'},
  {name:'Quincunx',glyph:'⚻',angle:150,orb:3,col:'#6b8199'}];
function aspects(dt,bodies=PLANET_ORDER){
  const eph=ephemeris(dt,bodies),out=[];
  for(let i=0;i<eph.length;i++)for(let j=i+1;j<eph.length;j++){
    const sep=Math.abs(rev180(eph[i].lon-eph[j].lon));
    for(const asp of ASPECTS){const orb=Math.abs(sep-asp.angle);
      if(orb<=asp.orb){out.push({a:eph[i].name,b:eph[j].name,aGlyph:eph[i].glyph,bGlyph:eph[j].glyph,
        aspect:asp.name,aspGlyph:asp.glyph,col:asp.col,exact:asp.angle,orb,sep});break;}}}
  return out.sort((x,y)=>x.orb-y.orb);
}
function sq9Value(P,angleDeg,turns=0){const root=Math.sqrt(P)+2*turns+angleDeg/180;return root*root;}
function sq9Levels(P,step=45,turns=2){
  const root0=Math.sqrt(P),out=[],total=turns*360;
  for(let ang=-total;ang<=total;ang+=step){const root=root0+ang/180;if(root<=0)continue;
    out.push({angle:ang,cardinal:(rev(ang)%90===0),price:root*root,deltaPct:(root*root-P)/P*100});}
  return out;
}
function sq9NearestSR(P,step=45,count=10){
  const root0=Math.sqrt(P),below=[],above=[];
  for(let n=-24;n<=24;n++){const root=root0+(n*step)/180;if(root<=0)continue;const v=root*root;if(v<P-1e-9)below.push(v);else if(v>P+1e-9)above.push(v);}
  below.sort((a,b)=>b-a);above.sort((a,b)=>a-b);
  return{support:below.slice(0,count),resistance:above.slice(0,count)};
}
function sq9Spiral(size=15,center=1){
  const cells={};let x=0,y=0;cells['0,0']=1;let leg=1,num=1;const dirs=[[1,0],[0,1],[-1,0],[0,-1]];let di=0;
  while(num<size*size){for(let s=0;s<2;s++){const[dx,dy]=dirs[di%4];
    for(let k=0;k<leg;k++){if(num>=size*size)break;x+=dx;y+=dy;num++;cells[x+','+y]=num;}di++;}leg++;}
  const half=Math.floor(size/2),rows=[];
  for(let r=half;r>=-half;r--){const row=[];
    for(let c=-half;c<=half;c++){const v=cells[c+','+r];if(v==null){row.push(null);continue;}
      row.push({val:v+(center-1),row:r,col:c,onCardinal:(c===0||r===0),onDiagonal:(Math.abs(c)===Math.abs(r))});}
    rows.push(row);}

/* Classic floor pivots + CPR (from a reference session's H/L/C) */
function pivotLevels(H,L,C){
  const P=(H+L+C)/3;
  const R1=2*P-L, S1=2*P-H;
  const R2=P+(H-L), S2=P-(H-L);
  const R3=H+2*(P-L), S3=L-2*(H-P);
  const BC=(H+L)/2, TC=2*P-BC;
  return {P,R1,R2,R3,S1,S2,S3,BC,TC,cprWidth:Math.abs(TC-BC)};
}
/* Camarilla levels */
function camarillaLevels(H,L,C){
  const r=H-L;
  return {H4:C+r*1.1/2,H3:C+r*1.1/4,H2:C+r*1.1/6,H1:C+r*1.1/12,
          L1:C-r*1.1/12,L2:C-r*1.1/6,L3:C-r*1.1/4,L4:C-r*1.1/2};
}
/* Extended floor pivots: classic R1-R3/S1-S3, then R4-R10/S4-S10 project the same (H-L) range step beyond R3/S3 */
function extendedPivots(H,L,C,count){
  count=count||10;
  const base=pivotLevels(H,L,C);
  const R=[base.R1,base.R2,base.R3],S=[base.S1,base.S2,base.S3];
  const range=H-L;
  for(let n=4;n<=count;n++){R.push(R[n-2]+range);S.push(S[n-2]-range);}
  return {P:base.P,BC:base.BC,TC:base.TC,cprWidth:base.cprWidth,R,S};
}
/* ISO-week / month / quarter / year bucket key for a 'YYYY-MM-DD' date string */
function periodKey(dateStr,period){
  const d=new Date(dateStr+'T00:00:00Z');
  if(period==='week'){
    const dt=new Date(Date.UTC(d.getUTCFullYear(),d.getUTCMonth(),d.getUTCDate()));
    const day=(dt.getUTCDay()+6)%7;dt.setUTCDate(dt.getUTCDate()-day+3);
    const firstThu=new Date(Date.UTC(dt.getUTCFullYear(),0,4));
    const fdOff=(firstThu.getUTCDay()+6)%7;
    const week=1+Math.round(((dt-firstThu)/86400000-3+fdOff)/7);
    return dt.getUTCFullYear()+'-W'+String(week).padStart(2,'0');
  }
  if(period==='month')return dateStr.slice(0,7);
  if(period==='quarter')return d.getUTCFullYear()+'-Q'+(Math.floor(d.getUTCMonth()/3)+1);
  if(period==='year')return String(d.getUTCFullYear());
  return dateStr;
}
/* Next weekday (Mon-Fri) after a 'YYYY-MM-DD' date, skipping Sat/Sun — used to tell whether a
   bar sits on the last possible trading day of its week/month/quarter/year. */
function nextWeekday(dateStr){
  const d=new Date(dateStr+'T00:00:00Z');
  do{d.setUTCDate(d.getUTCDate()+1);}while(d.getUTCDay()===0||d.getUTCDay()===6);
  return d.toISOString().slice(0,10);
}
/* True if no further trading day can fall in the same period as dateStr — i.e. this bar is
   already the period's close (e.g. a Friday bar completes its trading week even though the ISO
   calendar week still runs through Sunday). */
function isPeriodComplete(dateStr,period){
  return periodKey(dateStr,period)!==periodKey(nextWeekday(dateStr),period);
}
/* High/Low of the most recent COMPLETE week/month/quarter/year in a history array. If the last
   loaded bar is itself the final trading day of its period (e.g. a Friday close for 'week'),
   that period counts as complete rather than being treated as still in progress. */
function prevPeriodHighLow(hist,period){
  if(!hist||!hist.length)return null;
  const groups={},order=[];
  hist.forEach(bar=>{const k=periodKey(bar.t,period);if(!groups[k]){groups[k]=[];order.push(k);}groups[k].push(bar);});
  const lastT=hist[hist.length-1].t;
  let idx=order.lastIndexOf(periodKey(lastT,period));
  if(!isPeriodComplete(lastT,period))idx-=1;
  if(idx<0)return null;
  const bars=groups[order[idx]];
  let hiBar=bars[0],loBar=bars[0];
  bars.forEach(b=>{if(b.h>hiBar.h)hiBar=b;if(b.l<loBar.l)loBar=b;});
  return {high:hiBar.h,low:loBar.l,highDate:hiBar.t,lowDate:loBar.t,periodKey:order[idx]};
}
/* Fractal swing points: a bar whose high/low is the most extreme within `window` bars either side */
function findSwingPoints(hist,window){
  window=window||5;const highs=[],lows=[];
  if(!hist)return{highs,lows};
  for(let i=window;i<hist.length-window;i++){
    const cur=hist[i];let isHigh=true,isLow=true;
    for(let k=1;k<=window;k++){
      if(hist[i-k].h>=cur.h||hist[i+k].h>=cur.h)isHigh=false;
      if(hist[i-k].l<=cur.l||hist[i+k].l<=cur.l)isLow=false;
      if(!isHigh&&!isLow)break;
    }
    if(isHigh)highs.push({t:cur.t,price:cur.h,idx:i});
    if(isLow)lows.push({t:cur.t,price:cur.l,idx:i});
  }
  return {highs,lows};
}
/* Major swing = the single largest-magnitude confirmed fractal high/low across the loaded history */
function majorSwing(hist,window){
  const {highs,lows}=findSwingPoints(hist,window||5);
  let majorHigh=null,majorLow=null;
  highs.forEach(h=>{if(!majorHigh||h.price>majorHigh.price)majorHigh=h;});
  lows.forEach(l=>{if(!majorLow||l.price<majorLow.price)majorLow=l;});
  return {high:majorHigh,low:majorLow};
}

   fan/project upside (resistance). Neutral bases (manual/prevclose/open) keep whatever the user set. */

const LOW_ANCHOR_BASES=new Set(['pdl','pwl','pml','pql','pyl','swingl']);

}

function fmtN(x,dec=2){if(x==null||isNaN(x))return '–';return x.toLocaleString('en-US',{minimumFractionDigits:dec,maximumFractionDigits:dec});}

function fmtWk(d){return d.toLocaleDateString('en-GB',{weekday:'short'});}
function fmtTimeIST(d){try{return d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',timeZone:'Asia/Kolkata'});}catch(e){return d.toISOString().slice(11,16);}}
function fmtDateTimeIST(d){try{var p=new Intl.DateTimeFormat('en-CA',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',hour12:false,timeZone:'Asia/Kolkata'}).formatToParts(d).reduce(function(o,x){o[x.type]=x.value;return o;},{});return p.year+'-'+p.month+'-'+p.day+' '+p.hour+':'+p.minute+' IST';}catch(e){return d.toISOString().slice(0,16).replace('T',' ');}}

function GannFanPanel({price,ix,anchorBasis}){
  const [scale,setScale]=useState(ix.scale);const [bars,setBars]=useState(30);const [up,setUp]=useState(()=>anchorFanDir(anchorBasis)!=='dn');

  const fan=useMemo(()=>gannFan(price,scale,bars,up),[price,scale,bars,up]);
  const prices=fan.map(f=>f.price).concat([price]);
  const pMin=Math.min(...prices),pMax=Math.max(...prices),pad=(pMax-pMin)*0.08||1;
  const W=620,H=340,padL=8,padR=70;
  const yOf=p=>H-((p-(pMin-pad))/((pMax+pad)-(pMin-pad)))*H;
  return(<div>
    <h2 className="pg-head">Gann Fan <span className="sub">Angles</span></h2>
    <p className="pg-desc">Gann angles project geometric support/resistance from a pivot. The 1×1 (45°) is the master angle — one unit of price per unit of time. Set the scale (price units per bar) to your chart, then read where each angle sits after N bars.</p>

      <div className="panel"><h3>Angle Values @ {bars} bars</h3><table><thead><tr><th>Angle</th><th>Slope/bar</th><th>Price</th></tr></thead><tbody>
        {fan.map((f,i)=><tr key={i}><td className={f.label==='1x1'?'amb':''} style={{textAlign:'left'}}>{f.label==='1x1'?'★ ':''}{f.label}</td><td>{f.slopePerBar>=0?'+':''}{fmtN(f.slopePerBar,2)}</td><td>{fmtN(f.price,ix.dec)}</td></tr>)}

      <div className="panel"><h3>Fan Projection</h3>
        <svg viewBox={`0 0 ${W+padR} ${H}`} width="100%" style={{maxWidth:W+padR+'px'}}>

          {fan.map((f,i)=>{const y2=yOf(f.price);const star=f.label==='1x1';
            return<g key={i}><line x1={padL} y1={yOf(price)} x2={W} y2={y2} stroke={star?'var(--amb)':'var(--border2)'} strokeWidth={star?2:1}/>
            <text x={W+3} y={y2+4} fill={star?'var(--amb)':'var(--muted)'} fontSize="10">{f.label}</text></g>;})}
          <circle cx={padL} cy={yOf(price)} r="4" fill="var(--grn)"/>

    </div>
  </div>);
}

  const pan=(d)=>setOffset(o=>clamp(o+Math.round(bars*0.3)*d,0,Math.max(0,N-bars)));

  const fmt=v=>fmtN(v,ix.dec);
  const dateTicks=[];for(let k=0;k<=5;k++){const i=Math.round(k/5*(n-1));if(view[i])dateTicks.push({x:xOf(i),t:view[i].t});}
  const priceTicks=[];for(let k=0;k<=5;k++){const v=pMin+k/5*(pMax-pMin);priceTicks.push({y:yOf(v),v});}
  const hoverBar=hover&&view[hover.i];
  return(<div>
    <h2 className="pg-head">{ix.name} <span className="sub">Price Chart</span> <span style={{fontSize:11,padding:'2px 7px',borderRadius:4,background:isLive?'var(--grn2)':'var(--amb2)',color:isLive?'var(--grn)':'var(--amb)'}}>{isLive?('LIVE · '+(src||'OHLC')):'DEMO DATA'}</span></h2>
    <p className="pg-desc"><b>Scroll</b> to zoom · <b>drag</b> to pan · <b>click</b> a candle to set the pivot (drives every tool). {isLive?'':'Demo series shown — run fetch_data.py or load a CSV for real prices.'}</p>
    <div className="panel" style={{padding:'8px 12px'}}><div className="row" style={{marginBottom:0,gap:8,alignItems:'center'}}>
      <div style={{display:'flex',gap:4}}>
        <button className="btn sm" title="Zoom in" onClick={()=>zoom(0.8)}>＋</button>
        <button className="btn sm" title="Zoom out" onClick={()=>zoom(1.25)}>－</button>
        <button className="btn sm" title="Scroll to older bars" onClick={()=>pan(1)}>◀</button>
        <button className="btn sm" title="Scroll to newer bars" onClick={()=>pan(-1)}>▶</button>
        <button className="btn sm" title="Reset view" onClick={reset}>⟲ Reset</button>
      </div>
      <Field label="Fan scale (pts/bar)"><Num value={scale} onChange={setScale} w={84}/></Field>
      <Field label="Fan dir"><select value={dir} onChange={e=>setDir(e.target.value)}><option value="up">Rising ▲</option><option value="dn">Falling ▼</option></select></Field>
      <button className="btn sm" onClick={()=>{const b=view[n-1];if(b&&setAnchor)setAnchor(b.c,b.t);}}>Anchor → latest</button>
      <div className="mut" style={{fontSize:11,marginLeft:'auto'}}>{n?`${view[0].t} → ${view[n-1].t} · ${bars} bars`:''}</div>
    </div>
    <div style={{marginTop:8,display:'flex',flexWrap:'wrap',alignItems:'center'}}>
      <span className="mut" style={{marginRight:10,fontSize:11}}>OVERLAYS:</span>
      <Chk k="pivots" label="Pivot Points" c="#ff9d3b"/><Chk k="sq9" label="Sq9 Levels" c="var(--amb)"/><Chk k="fan" label="Gann Fan" c="var(--cyn)"/><Chk k="cycles" label="Time Cycles" c="var(--vio)"/>
      <Chk k="planets" label="Planetary Lines" c="var(--grn)"/><Chk k="moon" label="Moon Phases" c="#cdd9e5"/><Chk k="divs" label="Range Divisions" c="var(--mag)"/>
    </div>
    {(pivRef||todayBar)&&<div className="mut" style={{marginTop:6,fontSize:11}}>{todayBar?("Today "+todayBar.t+": open "+fmt(todayBar.o)):""}{pivRef?("  ·  prev session "+pivRef.t+": close "+fmt(pivRef.c)+", H "+fmt(pivRef.h)+", L "+fmt(pivRef.l)):""}</div>}</div>
    <div className="panel" style={{padding:6}} ref={chartWrapRef}>
      <svg ref={svgRef} viewBox={`0 0 ${VBW} ${VBH}`} width="100%" style={{display:'block',cursor:grab?'grabbing':'crosshair',userSelect:'none'}} onMouseDown={onDown} onMouseMove={onMove} onMouseUp={onUp} onMouseLeave={onLeave}>
        <defs><clipPath id="plotclip"><rect x={L} y={T} width={plotW} height={plotH}/></clipPath></defs>
        <rect x="0" y="0" width={VBW} height={VBH} fill="#0a0f17"/>
        {priceTicks.map((t,i)=><g key={'pt'+i}><line x1={L} y1={t.y} x2={L+plotW} y2={t.y} stroke="var(--gridline)"/><text x={L+plotW+4} y={t.y+3} fill="var(--dim)" fontSize="9">{fmt(t.v)}</text></g>)}
        {dateTicks.map((t,i)=><text key={'dt'+i} x={t.x} y={VBH-8} fill="var(--dim)" fontSize="9" textAnchor="middle">{t.t.slice(2)}</text>)}

            const yT=yOf(Math.max(d.o,d.c)),yB=yOf(Math.min(d.o,d.c));
            return<g key={i}><line x1={x} y1={yOf(d.h)} x2={x} y2={yOf(d.l)} stroke={col} strokeWidth="0.8"/>
              <rect x={x-barW/2} y={yT} width={barW} height={Math.max(0.8,yB-yT)} fill={col}/></g>;})}
          {ov.divs&&divs.map((l,i)=><line key={'dv'+i} x1={L} y1={yOf(l.price)} x2={L+plotW} y2={yOf(l.price)} stroke="var(--mag)" strokeWidth={l.frac===0.5?1:0.5} opacity={l.frac===0.5?0.7:0.35} strokeDasharray="2 3"/>)}
          {ov.pivots&&piv&&[['P',piv.P,'var(--amb)',1.4],['R1',piv.R1,'#f06a6a',0.9],['R2',piv.R2,'#f06a6a',0.9],['R3',piv.R3,'#f06a6a',0.9],['S1',piv.S1,'#36d399',0.9],['S2',piv.S2,'#36d399',0.9],['S3',piv.S3,'#36d399',0.9]].map((l,i)=>(l[1]>=pMin&&l[1]<=pMax?<g key={'pv'+i}><line x1={L} y1={yOf(l[1])} x2={L+plotW} y2={yOf(l[1])} stroke={l[2]} strokeWidth={l[3]} opacity="0.9"/><text x={L+92} y={yOf(l[1])-2} fill={l[2]} fontSize="9">{l[0]} {fmt(l[1])}</text></g>:null))}
          {ov.pivots&&piv&&[piv.TC,piv.BC].map((v,i)=>(v>=pMin&&v<=pMax?<line key={'cpr'+i} x1={L} y1={yOf(v)} x2={L+plotW} y2={yOf(v)} stroke="#ff9d3b" strokeWidth="0.7" strokeDasharray="1 2" opacity="0.7"/>:null))}
          {ov.pivots&&todayBar&&todayBar.o>=pMin&&todayBar.o<=pMax&&<line x1={L} y1={yOf(todayBar.o)} x2={L+plotW} y2={yOf(todayBar.o)} stroke="#ffffff" strokeWidth="0.7" strokeDasharray="4 3" opacity="0.55"/>}

          {ov.fan&&rays.map((r,i)=><line key={'f'+i} x1={r.x1} y1={r.y1} x2={r.x2} y2={r.y2} stroke={r.star?'var(--amb)':'var(--cyn)'} strokeWidth={r.star?1.6:0.8} opacity={r.star?1:0.7}/>)}
          {ov.cycles&&cyc.map((c,i)=>{const x=xForDate(c.date);if(x<L||x>L+plotW)return null;return<g key={'c'+i}><line x1={x} y1={T} x2={x} y2={T+plotH} stroke="var(--vio)" strokeWidth="0.8" opacity="0.7" strokeDasharray="4 3"/><text x={x+2} y={T+10} fill="var(--vio)" fontSize="8">{c.days}d</text></g>;})}
          {ov.moon&&moon.map((m,i)=>{const x=xForDate(m.date);if(x<L||x>L+plotW)return null;const full2=m.label==='Full Moon';return<g key={'m'+i}><line x1={x} y1={T} x2={x} y2={T+plotH} stroke="#7d8aa0" strokeWidth="0.6" opacity="0.5"/><circle cx={x} cy={T+8} r="4" fill={full2?'#e8eef5':'#1a2636'} stroke="#cdd9e5" strokeWidth="0.8"/></g>;})}
          {price>=pMin&&price<=pMax&&<circle cx={anchorX} cy={yOf(price)} r="4" fill="var(--grn)" stroke="#000" strokeWidth="0.5"/>}
          {hover&&<g><line x1={hover.x} y1={T} x2={hover.x} y2={T+plotH} stroke="var(--muted)" strokeWidth="0.5" strokeDasharray="2 2"/><line x1={L} y1={hover.y} x2={L+plotW} y2={hover.y} stroke="var(--muted)" strokeWidth="0.5" strokeDasharray="2 2"/></g>}
        </g>
        {hover&&<text x={L+plotW+4} y={hover.y+3} fill="var(--cyn)" fontSize="9">{fmt(hover.p)}</text>}
      </svg>
      {hoverBar&&<div style={{display:'flex',gap:16,padding:'4px 10px',fontSize:11,color:'var(--muted)',borderTop:'1px solid var(--border)'}}>
        <span className="cyn">{hoverBar.t}</span><span>O <b className="mut">{fmt(hoverBar.o)}</b></span><span>H <b className="amb">{fmt(hoverBar.h)}</b></span><span>L <b className="amb">{fmt(hoverBar.l)}</b></span><span>C <b style={{color:hoverBar.c>=hoverBar.o?'var(--grn)':'var(--red)'}}>{fmt(hoverBar.c)}</b></span></div>}
    </div>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:12}}>
      <div className="panel"><h3>Anchor (pivot)</h3><table><tbody>
        <tr><td className="l mut">Price</td><td className="pricebox">{fmt(price)}</td></tr>
        <tr><td className="l mut">Date</td><td className="cyn">{fmtDate(dt)}</td></tr>
        <tr><td className="l mut">√Price</td><td>{Math.sqrt(price).toFixed(3)}</td></tr>
      </tbody></table><div className="note">Click a candle to move the pivot.</div></div>
      <div className="panel"><h3>Sq9 Resistance</h3><table><tbody>{sr.resistance.map((v,i)=><tr key={i}><td className="l"><span className="tag res">R{i+1}</span></td><td>{fmt(v)}</td></tr>)}</tbody></table></div>
      <div className="panel"><h3>Sq9 Support</h3><table><tbody>{sr.support.map((v,i)=><tr key={i}><td className="l"><span className="tag sup">S{i+1}</span></td><td>{fmt(v)}</td></tr>)}</tbody></table></div>
    </div>
  </div>);
}

/* ===================== PIVOT POINTS PANEL (added) ===================== */
function PivotsPanel({price,ix,hist}){
  const [mode,setMode]=useState('classic');
  const data=(hist&&hist.length)?hist:[];const n=data.length;
  const today=n?data[n-1]:null;
  const refIdx=n>=2?n-2:(n?n-1:-1);
  const ref=refIdx>=0?data[refIdx]:null;
  const [oH,setOH]=useState(ref?ref.h:Math.round(price*1.01));
  const [oL,setOL]=useState(ref?ref.l:Math.round(price*0.99));
  const [oC,setOC]=useState(ref?ref.c:Math.round(price));
  useEffect(()=>{if(ref){setOH(ref.h);setOL(ref.l);setOC(ref.c);}},[ref&&ref.t]);
  const piv=useMemo(()=>pivotLevels(oH,oL,oC),[oH,oL,oC]);
  const ext=useMemo(()=>extendedPivots(oH,oL,oC,10),[oH,oL,oC]);
  const cam=useMemo(()=>camarillaLevels(oH,oL,oC),[oH,oL,oC]);
  const fmt=v=>fmtN(v,ix.dec);
  const cur=today?today.c:price;
  return(<div>
    <h2 className="pg-head">Pivot Points <span className="sub">prev session → today</span></h2>
    <p className="pg-desc">Classic floor-trader pivots, CPR and Camarilla levels computed from the <b>previous session's High/Low/Close</b> — the standard intraday reference. Edit H/L/C to override. These are real OHLC-based levels (not Square-of-9 projections).</p>
    <div className="panel"><div className="row">
      <Field label="Method"><select value={mode} onChange={e=>setMode(e.target.value)}><option value="classic">Classic + CPR</option><option value="extended">Extended R1-R10 / S1-S10</option><option value="camarilla">Camarilla</option></select></Field>
      <Field label="Prev High"><Num value={oH} onChange={setOH}/></Field>
      <Field label="Prev Low"><Num value={oL} onChange={setOL}/></Field>
      <Field label="Prev Close"><Num value={oC} onChange={setOC}/></Field>
    </div>
    <div className="mut" style={{fontSize:11}}>
      {ref?`Reference session: ${ref.t} (H ${fmt(ref.h)} · L ${fmt(ref.l)} · C ${fmt(ref.c)})`:'No OHLC loaded — using anchor estimates.'}
      {today?`  ·  Today (${today.t}) open ${fmt(today.o)} · last ${fmt(today.c)}`:''}
    </div></div>
    {mode==='classic'?
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
      <div className="panel"><h3>Classic Pivots</h3><table><tbody>
        <tr><td className="l"><span className="tag res">R3</span></td><td>{fmt(piv.R3)}</td><td className="mut">{((piv.R3-cur)/cur*100).toFixed(2)}%</td></tr>
        <tr><td className="l"><span className="tag res">R2</span></td><td>{fmt(piv.R2)}</td><td className="mut">{((piv.R2-cur)/cur*100).toFixed(2)}%</td></tr>
        <tr><td className="l"><span className="tag res">R1</span></td><td>{fmt(piv.R1)}</td><td className="mut">{((piv.R1-cur)/cur*100).toFixed(2)}%</td></tr>
        <tr><td className="l"><span className="tag card">P</span></td><td className="amb">{fmt(piv.P)}</td><td className="mut">pivot</td></tr>
        <tr><td className="l"><span className="tag sup">S1</span></td><td>{fmt(piv.S1)}</td><td className="mut">{((piv.S1-cur)/cur*100).toFixed(2)}%</td></tr>
        <tr><td className="l"><span className="tag sup">S2</span></td><td>{fmt(piv.S2)}</td><td className="mut">{((piv.S2-cur)/cur*100).toFixed(2)}%</td></tr>
        <tr><td className="l"><span className="tag sup">S3</span></td><td>{fmt(piv.S3)}</td><td className="mut">{((piv.S3-cur)/cur*100).toFixed(2)}%</td></tr>
      </tbody></table></div>
      <div className="panel"><h3>Central Pivot Range (CPR)</h3><table><tbody>
        <tr><td className="l">Top Central (TC)</td><td className="amb">{fmt(piv.TC)}</td></tr>
        <tr><td className="l">Pivot (P)</td><td>{fmt(piv.P)}</td></tr>
        <tr><td className="l">Bottom Central (BC)</td><td className="amb">{fmt(piv.BC)}</td></tr>
        <tr><td className="l">CPR width</td><td className="cyn">{fmt(piv.cprWidth)}</td></tr>
      </tbody></table>
      <div className="note">Narrow CPR ⇒ trending day expected; wide CPR ⇒ rangebound. Current price {fmt(cur)} is {cur>piv.P?'above':'below'} the pivot.</div></div>
    </div>
    :mode==='extended'?
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
      <div className="panel"><h3>Resistance R1–R10</h3><table><tbody>
        {ext.R.map((v,i)=><tr key={i}><td className="l"><span className="tag res">R{i+1}</span></td><td>{fmt(v)}</td><td className="mut">{((v-cur)/cur*100).toFixed(2)}%</td></tr>)}
      </tbody></table></div>
      <div className="panel"><h3>Support S1–S10</h3><table><tbody>
        {ext.S.map((v,i)=><tr key={i}><td className="l"><span className="tag sup">S{i+1}</span></td><td>{fmt(v)}</td><td className="mut">{((v-cur)/cur*100).toFixed(2)}%</td></tr>)}
      </tbody></table></div>
      <div className="note" style={{gridColumn:'1 / -1'}}>R1–R3 / S1–S3 are the classic floor-trader levels; R4–R10 / S4–S10 project the same (High−Low) range step beyond R3/S3.</div>
    </div>
    :
    <div className="panel"><h3>Camarilla Levels</h3><table><tbody>
      <tr><td className="l"><span className="tag res">H4</span> breakout</td><td>{fmt(cam.H4)}</td></tr>
      <tr><td className="l"><span className="tag res">H3</span> reversal</td><td>{fmt(cam.H3)}</td></tr>
      <tr><td className="l">H2</td><td>{fmt(cam.H2)}</td></tr>
      <tr><td className="l">H1</td><td>{fmt(cam.H1)}</td></tr>
      <tr><td className="l">L1</td><td>{fmt(cam.L1)}</td></tr>
      <tr><td className="l">L2</td><td>{fmt(cam.L2)}</td></tr>
      <tr><td className="l"><span className="tag sup">L3</span> reversal</td><td>{fmt(cam.L3)}</td></tr>
      <tr><td className="l"><span className="tag sup">L4</span> breakout</td><td>{fmt(cam.L4)}</td></tr>
    </tbody></table><div className="note">H3/L3 are the classic Camarilla reversal zone; H4/L4 are breakout triggers.</div></div>
    }
  </div>);
}

/* ===================== LIGHTWEIGHT-CHARTS LAYER (added) ===================== */
function addBizDays(dateStr,n){const d=new Date(dateStr+'T00:00:00Z');let a=0;while(a<n){d.setUTCDate(d.getUTCDate()+1);const w=d.getUTCDay();if(w!==0&&w!==6)a++;}return d.toISOString().slice(0,10);}
function bizRange(fromStr,count){const out=[];const d=new Date(fromStr+'T00:00:00Z');let a=0;while(a<count){d.setUTCDate(d.getUTCDate()+1);const w=d.getUTCDay();if(w!==0&&w!==6){out.push(d.toISOString().slice(0,10));a++;}}return out;}
function _cx(ctx){const data=(ctx.hist&&ctx.hist.length)?ctx.hist:[];const anchorT=(ctx.dt&&ctx.dt.toISOString)?ctx.dt.toISOString().slice(0,10):(data.length?data[data.length-1].t:null);const lastT=data.length?data[data.length-1].t:anchorT;const futureT=lastT?addBizDays(lastT,64):anchorT;return{data,anchorT,lastT,futureT};}
function _bandfn(price){return p=>isFinite(p)&&p>price*0.7&&p<price*1.4;}
const C_SUP='#36d399',C_RES='#f5b942',C_PIV='#ff9d3b',C_FAN='#48c6e8',C_VIO='#b98cff',C_MAG='#ff7ac6';
function hlSR(price){const sr=sq9NearestSR(price,45);const b=_bandfn(price);return sr.resistance.map((p,i)=>({price:p,color:C_RES,title:'R'+(i+1)})).concat(sr.support.map((p,i)=>({price:p,color:C_SUP,title:'S'+(i+1)}))).filter(l=>b(l.price));}
function hlPivots(data){const n=data.length;const ref=n>=2?data[n-2]:(n?data[n-1]:null);if(!ref)return[];const pv=pivotLevels(ref.h,ref.l,ref.c);const ext=extendedPivots(ref.h,ref.l,ref.c,10);
  const out=[{price:pv.P,color:C_PIV,title:'P',w:2},{price:pv.TC,color:'#7d8aa0',title:'TC',dash:true},{price:pv.BC,color:'#7d8aa0',title:'BC',dash:true}];
  ext.R.forEach((v,i)=>out.push({price:v,color:C_RES,title:'R'+(i+1),dash:i>=3}));
  ext.S.forEach((v,i)=>out.push({price:v,color:C_SUP,title:'S'+(i+1),dash:i>=3}));
  return out;}
function flFan(price,scale,dir,anchorT,futureT){const s=dir==='dn'?-1:1;return GANN_RATIOS.map(r=>({t1:anchorT,p1:price,t2:futureT,p2:price+s*scale*r.tpu*64,color:r.label==='1x1'?C_RES:C_FAN,w:r.label==='1x1'?2:1}));}
function mkCycles(dt){return gannTimeCycles(dt,[30,45,60,90,120,180,270,360]).map(c=>({time:c.date.toISOString().slice(0,10),position:'belowBar',color:C_VIO,shape:'arrowUp',text:c.days+'d'}));}
function hlPlanets(dt,price){const f=price/360;const b=_bandfn(price);const out=[];planetaryLines(dt,f,6,['Sun','Mercury','Venus','Mars','Jupiter','Saturn']).forEach(p=>{const inr=p.lines.find(l=>b(l.price));if(inr)out.push({price:inr.price,color:PCOLOR[p.name]||'#888',title:p.glyph+' '+p.name,dash:true});});return out;}
function mkMoon(dt,data){if(!data.length)return[];var span=(Date.parse(data[data.length-1].t)-Date.parse(data[0].t))/864e5;var cnt=Math.min(240,Math.ceil(span/7)+8);var out=[];nextMoonEvents(new Date(data[0].t),cnt).forEach(function(e){if(e.label==='New Moon'||e.label==='Full Moon')out.push({time:e.date.toISOString().slice(0,10),position:'aboveBar',color:e.label==='Full Moon'?'#e8eef5':'#7d8aa0',shape:'circle',text:e.label==='Full Moon'?'FM':'NM'});});return out;}
function hlDivs(data){if(data.length<2)return[];const v=data.slice(-180);const hi=Math.max.apply(null,v.map(d=>d.h)),lo=Math.min.apply(null,v.map(d=>d.l));return priceDivision(hi,lo,EIGHTHS).map(l=>({price:l.price,color:l.frac===0.5?C_RES:C_MAG,title:l.label,dash:l.frac!==0.5}));}

function tradingTimes(hist){return (hist&&hist.length)?hist.map(function(d){return d.t;}):[];}
function snapToTimes(t,times){if(!times||!times.length)return t;if(times.indexOf(t)>=0)return t;var tt=Date.parse(t+'T00:00:00Z');var best=times[0],bd=Math.abs(Date.parse(best+'T00:00:00Z')-tt);for(var i=1;i<times.length;i++){var d=Math.abs(Date.parse(times[i]+'T00:00:00Z')-tt);if(d<bd){bd=d;best=times[i];}}return best;}
function aspectMarkers(hist){var times=tradingTimes(hist);if(times.length<2)return [];var bodies=['Sun','Mercury','Venus','Mars','Jupiter','Saturn'];var hard={Conjunction:'\u260c',Square:'\u25a1',Opposition:'\u260d'};var cand={};times.forEach(function(t){var dd=new Date(t+'T12:00:00Z');aspects(dd,bodies).forEach(function(a){if(hard[a.aspect]&&a.orb<1.3){var key=a.a+'|'+a.b+'|'+a.aspect;(cand[key]=cand[key]||[]).push({orb:a.orb,time:t,glyph:hard[a.aspect]});}});});var out=[];Object.keys(cand).forEach(function(key){var arr=cand[key];var cl=[arr[0]];for(var i=1;i<=arr.length;i++){var cur=arr[i],prev=arr[i-1];if(cur&&(Date.parse(cur.time)-Date.parse(prev.time))<=25*864e5){cl.push(cur);}else{var bE=cl[0];cl.forEach(function(e){if(e.orb<bE.orb)bE=e;});out.push({time:bE.time,position:'aboveBar',color:'#f06a6a',shape:'circle',text:bE.glyph});cl=cur?[cur]:[];}}});return out;}
function retroMarkers(hist){var times=tradingTimes(hist);if(times.length<2)return [];var bodies=['Mercury','Venus','Mars','Jupiter','Saturn'];var G={Mercury:'\u263f',Venus:'\u2640',Mars:'\u2642',Jupiter:'\u2643',Saturn:'\u2644'};var prev=null,out=[];times.forEach(function(t){var dd=dayNumberFromDate(new Date(t+'T12:00:00Z'));var sp={};bodies.forEach(function(b){sp[b]=rev180(positionAt(b,dd+1).lon-positionAt(b,dd).lon);});if(prev){bodies.forEach(function(b){if((prev[b]<0)!==(sp[b]<0)){var gr=sp[b]<0;out.push({time:t,position:'belowBar',color:gr?'#b98cff':'#36d399',shape:gr?'arrowDown':'arrowUp',text:G[b]+(gr?'\u211e':'D')});}});}prev=sp;});return out;}
function LWChart({hist,spec,onAnchor,onReady,height,dec}){
  const wrapRef=React.useRef(null),panelRef=React.useRef(null),chartRef=React.useRef(null),seriesRef=React.useRef(null),ovRef=React.useRef([]),timesRef=React.useRef([]),setRecentRef=React.useRef(null);
  const [err,setErr]=useState('');const [legend,setLegend]=useState(null);const [fs,setFs]=useState(false);
  const fmtP=(v)=>fmtN(v,(dec==null?2:dec));
  const tscale=()=>chartRef.current&&chartRef.current.timeScale();
  const zoom=(f)=>{const t=tscale();if(!t)return;const r=t.getVisibleLogicalRange();if(!r)return;const c=(r.from+r.to)/2,half=(r.to-r.from)/2*f;try{t.setVisibleLogicalRange({from:c-half,to:c+half});}catch(e){}};
  const pan=(fr)=>{const t=tscale();if(!t)return;const r=t.getVisibleLogicalRange();if(!r)return;const w=(r.to-r.from)*fr;try{t.setVisibleLogicalRange({from:r.from+w,to:r.to+w});}catch(e){}};
  const doReset=()=>{if(setRecentRef.current)setRecentRef.current();};
  const doExpand=()=>{const el=panelRef.current;if(!el)return;try{if(!document.fullscreenElement){(el.requestFullscreen||el.webkitRequestFullscreen||function(){}).call(el);}else{(document.exitFullscreen||document.webkitExitFullscreen||function(){}).call(document);}}catch(e){}};
  useEffect(()=>{const hh=()=>setFs(!!document.fullscreenElement);document.addEventListener('fullscreenchange',hh);return ()=>document.removeEventListener('fullscreenchange',hh);},[]);
  const data=(hist&&hist.length)?hist:[];
  useEffect(()=>{
    const LC=(typeof window!=='undefined')&&window.LightweightCharts;const el=wrapRef.current;if(!el)return;
    if(!LC){setErr('Lightweight-Charts did not load (check connection).');return;}
    setErr('');
    const chart=LC.createChart(el,{autoSize:true,height:height||460,
      layout:{background:{type:'solid',color:'#0a0f17'},textColor:'#7e93a8',fontFamily:'inherit',fontSize:11},
      grid:{vertLines:{color:'#13202e'},horzLines:{color:'#13202e'}},
      rightPriceScale:{borderColor:'#1c2a3a'},timeScale:{borderColor:'#1c2a3a',rightOffset:4},
      crosshair:{mode:(LC.CrosshairMode&&LC.CrosshairMode.Normal)||0}});
    const series=chart.addCandlestickSeries({upColor:'#36d399',downColor:'#f06a6a',wickUpColor:'#36d399',wickDownColor:'#f06a6a',borderVisible:false});
    const real=data.map(d=>({time:d.t,open:d.o,high:d.h,low:d.l,close:d.c}));
    const ws=data.length?bizRange(data[data.length-1].t,280).map(t=>({time:t})):[];
    try{series.setData(real.concat(ws));}catch(e){try{series.setData(real);}catch(e2){}}
    timesRef.current=real.concat(ws).map(function(d){return d.time;});
    const setRecent=()=>{const n=real.length;try{chart.timeScale().setVisibleLogicalRange({from:Math.max(0,n-180),to:n+8});}catch(e){try{chart.timeScale().fitContent();}catch(e2){}}};
    setRecent();
    chartRef.current=chart;seriesRef.current=series;ovRef.current=[];
    if(onReady)onReady({fit:setRecent,fitAll:()=>{try{chart.timeScale().fitContent();}catch(e){}}});
    const clickH=(param)=>{if(!param||!param.point||param.time==null||!onAnchor)return;const p=series.coordinateToPrice(param.point.y);let t=param.time;
      if(t&&typeof t==='object'&&t.year)t=t.year+'-'+String(t.month).padStart(2,'0')+'-'+String(t.day).padStart(2,'0');else if(typeof t==='number')t=new Date(t*1000).toISOString().slice(0,10);
      if(p&&isFinite(p))onAnchor(+(+p).toFixed(2),t);};
    chart.subscribeClick(clickH);
    setRecentRef.current=setRecent;
    try{chart.subscribeCrosshairMove(function(param){if(!param||param.time==null||!param.seriesData){setLegend(null);return;}var d=param.seriesData.get(series);if(d&&d.open!=null){var t=param.time;if(t&&typeof t==='object'&&t.year)t=t.year+'-'+String(t.month).padStart(2,'0')+'-'+String(t.day).padStart(2,'0');setLegend({t:t,o:d.open,h:d.high,l:d.low,c:d.close});}else setLegend(null);});}catch(e){}
    return ()=>{try{chart.remove();}catch(e){}chartRef.current=null;seriesRef.current=null;};
  },[hist]);
  useEffect(()=>{
    const chart=chartRef.current,series=seriesRef.current,LC=(typeof window!=='undefined')&&window.LightweightCharts;
    if(!chart||!series||!LC)return;
    ovRef.current.forEach(o=>{try{o.k==='pl'?series.removePriceLine(o.r):chart.removeSeries(o.r);}catch(e){}});
    ovRef.current=[];
    const sp=spec||{};
    (sp.hlines||[]).forEach(l=>{if(!isFinite(l.price))return;try{const pl=series.createPriceLine({price:l.price,color:l.color||'#8aa',lineWidth:l.w||1,lineStyle:(l.dash&&LC.LineStyle)?LC.LineStyle.Dashed:(LC.LineStyle?LC.LineStyle.Solid:0),axisLabelVisible:true,title:l.title||''});ovRef.current.push({k:'pl',r:pl});}catch(e){}});
    (sp.flines||[]).forEach(f=>{try{const ls=chart.addLineSeries({color:f.color||'#48c6e8',lineWidth:f.w||1,priceLineVisible:false,lastValueVisible:false,crosshairMarkerVisible:false});ls.setData([{time:f.t1,value:f.p1},{time:f.t2,value:f.p2}]);ovRef.current.push({k:'ls',r:ls});}catch(e){}});
    try{var TT=timesRef.current;var mk=(sp.markers||[]).filter(m=>m&&m.time).map(function(m){return Object.assign({},m,{time:snapToTimes(m.time,TT)});});mk.sort(function(a,b){return a.time<b.time?-1:1;});series.setMarkers(mk);}catch(e){}
  },[spec?JSON.stringify(spec):'',hist]);
  const cbtn={background:'#11202e',border:'1px solid #24384c',color:'#9fb1c6',borderRadius:4,width:24,height:22,fontSize:12,cursor:'pointer',display:'inline-flex',alignItems:'center',justifyContent:'center',lineHeight:1};
  return(<div className="panel" ref={panelRef} style={{padding:6,position:'relative',height:fs?'100vh':'auto',width:fs?'100vw':'auto'}}>
    <div style={{position:'absolute',top:10,right:12,zIndex:6,display:'flex',gap:4}}>
      <button title="Zoom out" style={cbtn} onClick={()=>zoom(1.6)}>−</button>
      <button title="Zoom in" style={cbtn} onClick={()=>zoom(0.6)}>+</button>
      <button title="Pan left" style={cbtn} onClick={()=>pan(-0.3)}>◀</button>
      <button title="Pan right" style={cbtn} onClick={()=>pan(0.3)}>▶</button>
      <button title="Reset view" style={cbtn} onClick={doReset}>⟲</button>
      <button title={fs?'Exit full screen':'Expand full screen'} style={cbtn} onClick={doExpand}>{fs?'✕':'⛶'}</button>
    </div>
    {legend?<div style={{position:'absolute',top:10,left:12,zIndex:6,fontSize:11,color:'#9fb1c6',background:'rgba(10,15,23,0.82)',padding:'3px 9px',borderRadius:4,border:'1px solid #1c2a3a',whiteSpace:'nowrap'}}><b style={{color:'#cdd9e5'}}>{legend.t}</b>{'  '}O <span style={{color:'#cdd9e5'}}>{fmtP(legend.o)}</span>{'  '}H <span style={{color:'#36d399'}}>{fmtP(legend.h)}</span>{'  '}L <span style={{color:'#f06a6a'}}>{fmtP(legend.l)}</span>{'  '}C <span style={{color:legend.c>=legend.o?'#36d399':'#f06a6a'}}>{fmtP(legend.c)}</span></div>:null}
    <div ref={wrapRef} style={{width:'100%',height:fs?'calc(100vh - 14px)':((height||460)+'px')}}></div>
    {err?<div className="err" style={{padding:'6px 10px',fontSize:12}}>{err} Tables and Load data / CSV still work.</div>:null}
  </div>);
}

const CHART_TOOLS=new Set(['sq9calc','statsq9','dynsq9','pivots','gannfan','dynfan','zeroprice','sq9fan','dynlevels','sq9int','measdeg','singledeg','hilodeg','zerodeg','seventimes','trioct','pyrapoint','vibration','gsquares','wheel24','hexint','div3','div8','pricediv','planetlines','sq9planet','sq9dates','timecycles','trioctt','moon','gannbox','aspects','retro','signchg','timebydeg','apsides','eclipse','sq90','bayerrules']);

function buildToolSpec(id,ctx){
  const {price,dt,ix,hist}=ctx;const scale=ctx.scale||ix.scale;const X=_cx(ctx);const b=_bandfn(price);
  const fanDir=anchorFanDir(ctx.anchorBasis)||'up';const fanSign=fanDir==='dn'?-1:1;
  const S={hlines:[],flines:[],markers:[],title:''};
  try{switch(id){
    case 'sq9calc':case 'statsq9':case 'dynsq9': S.hlines=hlSR(price);S.title='Square of 9 S/R';break;
    case 'pivots': S.hlines=hlPivots(X.data);S.title='Pivot Points';break;
    case 'gannfan':case 'dynfan': S.flines=flFan(price,scale,fanDir,X.anchorT,X.futureT);S.title='Gann Fan';break;
    case 'zeroprice': S.flines=GANN_RATIOS.map(r=>({t1:X.anchorT,p1:price*0.5,t2:X.futureT,p2:price*0.5+fanSign*scale*r.tpu*64,color:r.label==='1x1'?C_RES:C_FAN,w:r.label==='1x1'?2:1}));S.title='Zero Price Fan';break;
    case 'sq9fan': S.hlines=sq9GannFan(price).map(f=>({price:f.price,color:f.angle%90===0?C_RES:C_FAN,title:f.angle+'°'})).filter(l=>b(l.price));S.title='Sq9 Gann Fan';break;
    case 'dynlevels': {const r0=Math.sqrt(price),a=[];for(let nn=-6;nn<=6;nn++)a.push(Math.pow(r0+(nn*90)/180,2));S.hlines=a.map(v=>({price:v,color:v>price+1e-6?C_RES:v<price-1e-6?C_SUP:C_PIV,title:''})).filter(l=>b(l.price));S.title='Dynamic Gann Levels';break;}
    case 'sq9int': S.hlines=sq9Intervals(price,6).map(l=>({price:l.price,color:C_FAN,title:'t'+l.turn})).filter(l=>b(l.price));S.title='Sq9 Intervals';break;
    case 'measdeg': S.hlines=degreeLine(price,[90,180,270,360,-90,-180]).map(l=>({price:l.price,color:l.deg>=0?C_RES:C_SUP,title:l.deg+'°'})).filter(l=>b(l.price));S.title='Measured Degree Line';break;
    case 'singledeg': {const ds=[];for(let d=-10;d<=10;d++)ds.push(d);S.hlines=degreeLine(price,ds).map(l=>({price:l.price,color:l.deg===0?C_PIV:(l.deg>0?C_RES:C_SUP),title:l.deg+'°'})).filter(l=>b(l.price));S.title='Single Degree Lines';break;}
    case 'hilodeg': {const r=highLowDegrees(Math.round(price*1.05),Math.round(price*0.95));S.hlines=[{price:r.projUp,color:C_RES,title:'proj+'},{price:r.projDn,color:C_SUP,title:'proj-'}].filter(l=>b(l.price));S.title='High/Low Degree';break;}
    case 'zerodeg': {const r0=Math.round(Math.sqrt(price));const aa=[];for(let k=-6;k<=6;k++){const nn=r0+k;if(nn>0)aa.push({price:nn*nn,color:nn*nn>price?C_RES:(nn*nn<price?C_SUP:C_PIV),title:nn+'²'});}S.hlines=aa.filter(l=>b(l.price));S.title='Zero Degree Squares';break;}
    case 'seventimes': S.hlines=sevenTimesBase(Math.round(price*0.5)).map(l=>({price:l.price,color:l.key?C_RES:C_FAN,title:l.mult+'x'})).filter(l=>b(l.price));S.title='Seven Times Base';break;
    case 'trioct': S.hlines=tripleOctave(Math.round(price*0.25)).map(l=>({price:l.price,color:l.octave?C_RES:C_FAN,title:l.octave?'oct':''})).filter(l=>b(l.price));S.title='Triple Octave';break;
    case 'pyrapoint': S.hlines=pyrapoint(price).map(l=>({price:l.price,color:l.step===0?C_PIV:(l.step>0?C_RES:C_SUP),title:(l.step>0?'+':'')+l.step})).filter(l=>b(l.price));S.title='Pyrapoint';break;
    case 'vibration': {const rate=Math.max(1,Math.round(price*0.01));S.hlines=vibration(price,rate,8).map(l=>({price:l.price,color:l.n===0?C_PIV:C_FAN,title:''})).filter(l=>b(l.price));S.title='Pattern of Vibration';break;}
    case 'gsquares': {const sq=gannSquares(price,144,scale,dt);S.hlines=sq.price.map(l=>({price:l.up,color:C_RES,title:l.label})).concat(sq.price.map(l=>({price:l.dn,color:C_SUP,title:l.label}))).filter(l=>b(l.price));S.title='Gann Squares (144)';break;}
    case 'wheel24': S.hlines=wheel24(price,0).map(s=>({price:s.price,color:s.cardinal?C_RES:C_FAN,title:s.angle+'°'})).filter(l=>b(l.price));S.title='Wheel of 24';break;
    case 'hexint': {const hx=hexCentered(price,6);S.hlines=hx.resistance.map(l=>({price:l.val,color:C_RES,title:'k'+l.k})).concat(hx.support.map(l=>({price:l.val,color:C_SUP,title:'k'+l.k}))).filter(l=>b(l.price));S.title='Hex Intervals';break;}
    case 'div3': {const hi=Math.round(price*1.08),lo=Math.round(price*0.92);S.hlines=priceDivision(hi,lo,THIRDS).map(l=>({price:l.price,color:l.frac===0.5?C_RES:C_FAN,title:l.label}));S.title='Division of 3rds';break;}
    case 'div8': {const hi=Math.round(price*1.08),lo=Math.round(price*0.92);S.hlines=priceDivision(hi,lo,EIGHTHS).map(l=>({price:l.price,color:l.frac===0.5?C_RES:C_FAN,title:l.label}));S.title='Division of 8ths';break;}
    case 'pricediv': {const hi=Math.round(price*1.1),lo=Math.round(price*0.9);S.hlines=priceDivision(hi,lo,EIGHTHS).map(l=>({price:l.price,color:l.frac===0.5?C_RES:C_FAN,title:l.label}));S.title='Price Division';break;}
    case 'planetlines': S.hlines=hlPlanets(dt,price);S.title='Planetary Lines';break;
    case 'sq9planet': {const out=[];sq9PlanetaryIntervals(price,dt,1).forEach(p=>{p.levels.forEach(l=>{if(l.turn===0)out.push({price:l.price,color:PCOLOR[p.name]||'#888',title:p.glyph});});});S.hlines=out.filter(l=>b(l.price));S.title='Sq9 Planetary Intervals';break;}
    case 'sq9dates': S.markers=sq9Dates(dt,45,2).map(d=>({time:d.date.toISOString().slice(0,10),position:'belowBar',color:d.cardinal?C_RES:C_VIO,shape:'arrowUp',text:d.angle+'°'}));S.title='Square of 9 Dates';break;
    case 'timecycles': S.markers=mkCycles(dt);S.title='Gann Day Count';break;
    case 'trioctt': S.markers=tripleOctaveTime(dt,45).map(o=>({time:o.date.toISOString().slice(0,10),position:'belowBar',color:C_VIO,shape:'arrowUp',text:o.days+'d'}));S.title='Triple Octave Time';break;
    case 'moon': S.markers=mkMoon(dt,X.data);S.title='Moon Phases';break;
    case 'aspects': S.markers=aspectMarkers(hist);S.title='Planetary Aspects (exact hard-aspect dates)';break;
    case 'retro': S.markers=retroMarkers(hist);S.title='Retrograde Stations';break;
    case 'signchg': {var Ra=_astroRange(dt,hist,200);S.markers=signChanges(Ra.st,Ra.dys,['Sun','Mercury','Venus','Mars','Jupiter','Saturn']).map(function(r){return{time:r.date.toISOString().slice(0,10),position:'belowBar',color:PCOLOR[r.body]||'#888',shape:'circle',text:(GLYPH[r.body]||'')+r.signGlyph};});S.title='Planetary Sign Changes';break;}
    case 'timebydeg': S.markers=timeByDegrees(dt,'Sun',[30,45,60,90,120,144,180,270,360],520).map(function(r){return{time:r.date.toISOString().slice(0,10),position:'aboveBar',color:'#f5b942',shape:'arrowDown',text:r.deg+'°'};});S.title='Time By Planetary Degrees (Sun)';break;
    case 'apsides': {var Rb=_astroRange(dt,hist,200);S.markers=moonApsides(Rb.st,Rb.dys).map(function(r){return{time:r.date.toISOString().slice(0,10),position:'belowBar',color:r.type==='Perigee'?'#f06a6a':'#48c6e8',shape:'circle',text:r.type==='Perigee'?'Pg':'Ap'};});S.title='Moon Apogee / Perigee';break;}
    case 'eclipse': {var Rc=_astroRange(dt,hist,200);S.markers=eclipses(Rc.st,Rc.dys).map(function(r){return{time:r.date.toISOString().slice(0,10),position:'aboveBar',color:r.type==='Solar Eclipse'?'#f5b942':'#b98cff',shape:'circle',text:r.type==='Solar Eclipse'?'SoE':'LuE'};});S.title='Eclipses';break;}
    case 'gannbox': {const p1=Math.round(price*0.92),p2=Math.round(price*1.08);S.hlines=[0,0.25,0.333,0.5,0.667,0.75,1].map(f=>({price:p1+(p2-p1)*f,color:f===0.5?C_RES:C_FAN,title:(f*100).toFixed(0)+'%'}));S.title='Gann Box';break;}
    case 'sq90': {var q90=square90Price(price);S.hlines=q90.map(function(p){return {price:p.up,color:p.col,title:p.deg+'\u00b0R'};}).concat(q90.map(function(p){return {price:p.dn,color:p.col,title:p.deg+'\u00b0S',dash:true};})).filter(function(l){return b(l.price);});S.markers=square90Time(dt,540).map(function(t){return {time:t.date.toISOString().slice(0,10),position:'belowBar',color:t.col,shape:'arrowUp',text:t.angle+'\u00b0'};});S.title='Square of 90 (quarters + time)';break;}
    case 'bayerrules': {
      const bScans=BAYER_RULES.map(r=>({rule:r,events:scanBayerRule(r,X.data)}));
      const bWith=bScans.filter(s=>s.events.length);
      const bTypeColor={aspect:'#f5b942',station:'#b98cff',ingress:'#48c6e8'};
      S.markers=[];
      bWith.forEach(s=>{s.events.forEach(e=>{S.markers.push({time:e.time,position:'aboveBar',color:bTypeColor[s.rule.conditionType]||'#8aa',shape:e.projected?'arrowDown':'circle',text:(e.projected?'»':'')+s.rule.name.slice(0,2).toUpperCase()});});});
      const bTop=bWith.slice().sort((a,b2)=>b2.events.length-a.events.length)[0];
      if(bTop)S.hlines=bTop.events.filter(e=>e.close!=null).map(e=>({price:e.close,color:bTypeColor[bTop.rule.conditionType]||C_RES,title:bTop.rule.name.slice(0,12),dash:true}));
      S.title='Bayer Rules'+(bTop?(' \u2014 horizontal marks: '+bTop.rule.name):'');
      break;
    }
    default: return null;
  }}catch(e){return {hlines:[],flines:[],markers:[],title:''};}
  return S;
}

function ToolChartView({id,price,dt,ix,hist,setAnchor,anchorBasis,table}){
  const spec=useMemo(()=>buildToolSpec(id,{price,dt,ix,hist,anchorBasis}),[id,price,dt,ix,hist,anchorBasis]);
  return(<div>
    <LWChart hist={hist} spec={spec} onAnchor={setAnchor} height={560} dec={ix.dec}/>
    <div style={{marginTop:14}}>{table}</div>
  </div>);
}

/* How far beyond the last loaded bar to project upcoming Bayer rule triggers */
const BAYER_FUTURE_BIZDAYS=240;
function scanAspectRule(hist,bodyA,bodyB,aspectName){
  const lastT=hist&&hist.length?hist[hist.length-1].t:null;if(!lastT)return[];
  const times=tradingTimes(hist).concat(bizRange(lastT,BAYER_FUTURE_BIZDAYS));
  const aspDef=ASPECTS.find(a=>a.name===aspectName);if(!aspDef)return[];
  const cand=[];
  times.forEach(t=>{
    const eph=ephemeris(new Date(t+'T12:00:00Z'),[bodyA,bodyB]);
    const sep=Math.abs(rev180(eph[0].lon-eph[1].lon));
    const orb=Math.abs(sep-aspDef.angle);
    if(orb<=aspDef.orb)cand.push({t,orb});
  });
  const out=[];let cl=[];
  const flush=()=>{if(!cl.length)return;let best=cl[0];cl.forEach(c=>{if(c.orb<best.orb)best=c;});out.push(best.t);cl=[];};
  cand.forEach(c=>{if(cl.length&&(Date.parse(c.t)-Date.parse(cl[cl.length-1].t))>20*864e5)flush();cl.push(c);});
  flush();
  return out;
}
function scanStationRule(hist,body){
  const lastT=hist&&hist.length?hist[hist.length-1].t:null;if(!lastT)return[];
  const times=tradingTimes(hist).concat(bizRange(lastT,BAYER_FUTURE_BIZDAYS));
  let prevSpeed=null;const out=[];
  times.forEach(t=>{
    const d=dayNumberFromDate(new Date(t+'T12:00:00Z'));
    const sp=rev180(positionAt(body,d+1).lon-positionAt(body,d).lon);
    if(prevSpeed!=null&&(prevSpeed<0)!==(sp<0))out.push(t);
    prevSpeed=sp;
  });
  return out;
}
function scanIngressRule(hist,body){
  if(!hist||!hist.length)return[];
  const start=new Date(hist[0].t+'T12:00:00Z');
  const lastT=hist[hist.length-1].t;
  const days=Math.round((Date.parse(lastT)-Date.parse(hist[0].t))/86400000)+1+Math.round(BAYER_FUTURE_BIZDAYS*7/5);
  const times=tradingTimes(hist);
  return signChanges(start,days,[body]).map(r=>{
    const iso=r.date.toISOString().slice(0,10);
    if(iso<=lastT)return snapToTimes(iso,times);
    const d=new Date(iso+'T00:00:00Z');
    while(d.getUTCDay()===0||d.getUTCDay()===6)d.setUTCDate(d.getUTCDate()+1);
    return d.toISOString().slice(0,10);
  });
}
/* Scans a rule across the loaded history AND ~BAYER_FUTURE_BIZDAYS ahead. Past triggers carry
   the session close; future triggers have no price yet and are flagged projected:true. */
function scanBayerRule(rule,hist){
  if(!hist||!hist.length)return[];
  const p=rule.conditionParams;let dates=[];
  if(rule.conditionType==='aspect')dates=scanAspectRule(hist,p.bodyA,p.bodyB,p.aspect);
  else if(rule.conditionType==='station')dates=scanStationRule(hist,p.body);
  else if(rule.conditionType==='ingress')dates=scanIngressRule(hist,p.body);
  const byT={};hist.forEach(b=>{byT[b.t]=b;});
  const lastT=hist[hist.length-1].t;
  const seen={};const out=[];
  dates.forEach(t=>{
    if(seen[t])return;seen[t]=true;
    if(byT[t])out.push({time:t,close:byT[t].c,projected:false});
    else if(t>lastT)out.push({time:t,close:null,projected:true});
  });
  out.sort((a,b)=>a.time<b.time?-1:1);
  return out;
}

/* ===================== ASTRO EXPANSION (added) ===================== */
function signChanges(startDt,days,bodies){
  bodies=bodies||['Sun','Mercury','Venus','Mars','Jupiter','Saturn','Uranus','Neptune'];
  var out=[],prev={};
  for(var i=0;i<days;i++){var dt=new Date(startDt.getTime()+i*86400000);var d=dayNumberFromDate(dt);
    bodies.forEach(function(b){var si=Math.floor(rev(positionAt(b,d).lon)/30);
      if(prev[b]!=null&&si!==prev[b]&&((si-prev[b]+12)%12)===1){out.push({date:dt,body:b,glyph:GLYPH[b],sign:ZODIAC[si],signGlyph:ZGLYPH[si]});}
      prev[b]=si;});}
  return out;
}
function timeByDegrees(startDt,body,targets,maxDays){
  body=body||'Sun';maxDays=maxDays||500;var sorted=targets.slice().sort(function(a,b){return a-b;});
  var prevLon=positionAt(body,dayNumberFromDate(startDt)).lon,cum=0,ti=0,out=[];
  for(var i=1;i<=maxDays&&ti<sorted.length;i++){var dt=new Date(startDt.getTime()+i*86400000);
    var lon=positionAt(body,dayNumberFromDate(dt)).lon;cum+=rev180(lon-prevLon);prevLon=lon;
    while(ti<sorted.length&&cum>=sorted[ti]){out.push({date:dt,deg:sorted[ti],body:body});ti++;}}
  return out;
}
function moonApsides(startDt,days){
  var r=[];for(var i=0;i<days;i++){var dt=new Date(startDt.getTime()+i*86400000);r.push({dt:dt,dist:positionAt('Moon',dayNumberFromDate(dt)).dist});}
  var out=[];for(var j=2;j<r.length-2;j++){
    if(r[j].dist>r[j-1].dist&&r[j].dist>=r[j+1].dist&&r[j].dist>r[j-2].dist)out.push({date:r[j].dt,type:'Apogee',dist:r[j].dist});
    else if(r[j].dist<r[j-1].dist&&r[j].dist<=r[j+1].dist&&r[j].dist<r[j-2].dist)out.push({date:r[j].dt,type:'Perigee',dist:r[j].dist});}
  return out;
}
function eclipses(startDt,days){
  var evs=nextMoonEvents(startDt,Math.ceil(days/7)+4),out=[];
  function sep(a,b){var x=Math.abs(rev(a-b));return Math.min(x,360-x);}
  evs.forEach(function(e){if(e.label!=='New Moon'&&e.label!=='Full Moon')return;
    if((e.date-startDt)/86400000>days)return;
    var d=dayNumberFromDate(e.date),sun=positionAt('Sun',d).lon,node=rev(ELEMENTS.Moon(d).N);
    var s=Math.min(sep(sun,node),sep(sun,node+180));var orb=e.label==='New Moon'?18.5:12.5;
    if(s<orb)out.push({date:e.date,type:e.label==='New Moon'?'Solar Eclipse':'Lunar Eclipse',sep:s});});
  return out;
}
function synodicCycles(dt){
  var pairs=[['Sun','Mercury'],['Sun','Venus'],['Sun','Mars'],['Sun','Jupiter'],['Sun','Saturn'],['Venus','Mars'],['Mars','Jupiter'],['Jupiter','Saturn']];
  var d0=dayNumberFromDate(dt);
  return pairs.map(function(p){var a=positionAt(p[0],d0),b=positionAt(p[1],d0);
    var sa=rev180(positionAt(p[0],d0+1).lon-a.lon),sb=rev180(positionAt(p[1],d0+1).lon-b.lon);
    var rel=sa-sb,syn=rel!==0?360/Math.abs(rel):Infinity,sepd=rev(b.lon-a.lon);
    return{pair:p[0]+'–'+p[1],sep:sepd,synodic:syn,glyphA:GLYPH[p[0]],glyphB:GLYPH[p[1]]};});
}
function _astroRange(dt,hist,pad){var st=(hist&&hist.length)?new Date(hist[0].t+'T12:00:00Z'):new Date(dt.getTime()-180*86400000);
  var dys=(hist&&hist.length)?Math.round((Date.parse(hist[hist.length-1].t)-Date.parse(hist[0].t))/86400000)+(pad||1):360;return{st:st,dys:dys};}

function EphemerisChartPanel({dt}){const bodies=['Sun','Mercury','Venus','Mars','Jupiter','Saturn'];const [days,setDays]=useState(365);
  const data=useMemo(()=>{const arr=[];const start=new Date(dt.getTime()-days*0.5*86400000);const step=Math.max(1,Math.round(days/180));
    for(let i=0;i<=days;i+=step){const d=dayNumberFromDate(new Date(start.getTime()+i*86400000));const row={};bodies.forEach(b=>row[b]=positionAt(b,d).lon);arr.push(row);}return arr;},[dt,days]);
  const W=900,H=470,L=34,R=78,T=14,B=24;const xOf=i=>L+(W-L-R)*i/(data.length-1);const yOf=lon=>T+(H-T-B)*(1-lon/360);
  return(<div><h2 className="pg-head">Ephemeris Chart</h2>
    <p className="pg-desc">Geocentric ecliptic longitude (0–360°) of each planet over time. Where lines cross, planets are conjunct; 180° apart is opposition — a visual map of the planetary cycles.</p>
    <div className="panel" style={{padding:'8px 12px'}}><div className="row" style={{marginBottom:6}}><Field label="Window (days)"><Num value={days} onChange={setDays} w={90}/></Field><div className="mut">Centred on {fmtDate(dt)}</div></div></div>
    <div className="panel" style={{padding:6}}><svg viewBox={`0 0 ${W} ${H}`} width="100%" style={{maxWidth:W+'px'}}>
      {[0,90,180,270,360].map(g=><g key={g}><line x1={L} y1={yOf(g)} x2={W-R} y2={yOf(g)} stroke="var(--gridline)"/><text x={4} y={yOf(g)+3} fill="var(--dim)" fontSize="9">{g}°</text></g>)}
      {bodies.map(b=>{const segs=[];let cur=[];for(let i=0;i<data.length;i++){if(i>0&&Math.abs(data[i][b]-data[i-1][b])>180){segs.push(cur);cur=[];}cur.push(xOf(i)+','+yOf(data[i][b]));}segs.push(cur);
        return<g key={b}>{segs.map((s,si)=><polyline key={si} points={s.join(' ')} fill="none" stroke={PCOLOR[b]} strokeWidth="1.5"/>)}<text x={W-R+4} y={yOf(data[data.length-1][b])+3} fill={PCOLOR[b]} fontSize="10">{GLYPH[b]} {b}</text></g>;})}
    </svg></div></div>);}

/* ===================== SQUARE OF 90 (added) ===================== */
const SEASONS=[
  {q:'1st Quarter',phase:'Accumulation',season:'Spring',col:'#36d399'},
  {q:'2nd Quarter',phase:'Mark-Up',season:'Summer',col:'#f5b942'},
  {q:'3rd Quarter',phase:'Distribution',season:'Autumn',col:'#ff9d3b'},
  {q:'4th Quarter',phase:'Decline',season:'Winter',col:'#f06a6a'}
];
function quadrantOf(angle){var a=((angle%360)+360)%360;return SEASONS[Math.min(3,Math.floor(a/90))];}
function square90Time(anchorDate,maxDeg){maxDeg=maxDeg||720;var out=[];for(var d=45;d<=maxDeg;d+=45){var q=quadrantOf(d);out.push({days:d,date:new Date(anchorDate.getTime()+d*86400000),angle:((d%360)+360)%360,cycle:Math.ceil(d/360),quad:q.q,phase:q.phase,season:q.season,col:q.col});}return out;}
function square90Price(anchorPrice){var r=Math.sqrt(anchorPrice);var out=[];[45,90,135,180,225,270,315,360].forEach(function(deg){var q=quadrantOf(deg);out.push({deg:deg,up:Math.pow(r+deg/180,2),dn:Math.pow(Math.max(0,r-deg/180),2),quad:q.q,phase:q.phase,col:q.col});});return out;}
function square90Grid(){var rows=sq9Spiral(11,1);return rows.map(function(row){return row.map(function(c){return (c&&c.val<=90)?c:null;});});}

function Square90Panel({price,dt,ix}){
  const tcyc=useMemo(()=>square90Time(dt,720),[dt]);
  const plv=useMemo(()=>square90Price(price),[price]);
  const fmt=v=>fmtN(v,ix.dec);
  return(<div>
    <h2 className="pg-head">Square of 90 <span className="sub">time &amp; seasonal quarters</span></h2>
    <p className="pg-desc">Gann's master time wheel: the 360° circle split into four 90° quarters (seasons). From the anchor date and price, every 45°/90° marks a shift between Accumulation, Mark-Up, Distribution and Decline. Time counts plot as markers and the quarter price levels as lines on the chart above. 90° = reaction · 180° = reversal · 360° = renewal.</p>
    <div className="cards">
      {SEASONS.map((s,i)=><div key={i} className="card"><h4 style={{color:s.col}}>{(i*90)}°–{(i*90+90)}° · {s.q}</h4><div className="big" style={{fontSize:'15px',color:s.col}}>{s.phase}</div><div className="mut">{s.season}</div></div>)}
    </div>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginTop:12}}>
      <div className="panel"><h3>Time Cycle Projection (from {fmtDate(dt)})</h3><div className="scroll"><table><thead><tr><th>Angle</th><th>Days</th><th className="l">Date</th><th className="l">Quarter · Phase</th></tr></thead><tbody>
        {tcyc.map((t,i)=><tr key={i}><td style={{color:t.col}}>{t.angle}°{t.cycle>1?(' ·C'+t.cycle):''}</td><td>{t.days}</td><td className="l cyn">{fmtDate(t.date)}</td><td className="l" style={{color:t.col}}>{t.quad} · {t.phase}</td></tr>)}
      </tbody></table></div></div>
      <div className="panel"><h3>Quarter Price Levels (from {fmt(price)})</h3><table><thead><tr><th>Angle</th><th>Resistance ↑</th><th>Support ↓</th><th className="l">Quarter</th></tr></thead><tbody>
        {plv.map((p,i)=><tr key={i}><td style={{color:p.col}}>{p.deg}°</td><td className="amb">{fmt(p.up)}</td><td className="pos">{fmt(p.dn)}</td><td className="l" style={{color:p.col}}>{p.quad}</td></tr>)}
      </tbody></table></div>
    </div>
    <div className="note">Watch for confluence where a time count and a price level share the same angle — the squaring of price &amp; time. “When time is up, change must come.”</div>
  </div>);
}

function Square90Wheel({price}){
  const grid=useMemo(()=>square90Grid(),[]);
  const anchorCell=(((Math.round(price)-1)%90)+90)%90+1;
  return(<div>
    <h2 className="pg-head">The Square of 90 <span className="sub">master spiral · 1–90</span></h2>
    <p className="pg-desc">Numbers 1–90 spiralled from the centre — one full 360° rotation divided into four 90° quarters. The cardinal cross (green) and 45° diagonals (cyan) are the quarter and eighth spokes; the amber cell marks the anchor's position on the wheel ({fmtN(anchorCell,0)} = price mod 90).</p>
    <div className="panel"><div style={{overflow:'auto'}}><table className="spiral"><tbody>
      {grid.map((row,ri)=><tr key={ri}>{row.map((c,ci)=>{if(!c)return<td key={ci}></td>;
        var cls=c.val===anchorCell?'center':(c.onCardinal?'card':c.onDiagonal?'diag':'');
        return<td key={ci} className={cls}>{c.val}</td>;})}</tr>)}
    </tbody></table></div>
    <div className="legend"><span><i className="sw" style={{background:'var(--amb)'}}></i>Anchor (price mod 90)</span><span><i className="sw" style={{background:'#0e2b22'}}></i>Cardinal cross · 90° quarters</span><span><i className="sw" style={{background:'#14233a'}}></i>45° diagonals · eighths</span></div>
    </div>
  </div>);
}

function App(){

  const [anchorBasis,setAnchorBasis]=useState('prevclose');
  const anchorFromHist=(basis,H)=>{
    if(!H||!H.length)return null;
    const lastT=H[H.length-1].t;
    if(basis==='open')return{p:+H[H.length-1].o,d:lastT};
    if(basis==='pdh'||basis==='pdl'){
      if(H.length<2)return null;
      const ref=H[H.length-2];
      return{p:basis==='pdh'?ref.h:ref.l,d:ref.t};
    }
    if(/^p[wmqy][hl]$/.test(basis)){
      const period={w:'week',m:'month',q:'quarter',y:'year'}[basis[1]];
      const r=prevPeriodHighLow(H,period);
      if(!r)return null;
      const isHigh=basis[2]==='h';
      return{p:isHigh?r.high:r.low,d:isHigh?r.highDate:r.lowDate};
    }
    if(basis==='swingh'||basis==='swingl'){
      const sw=majorSwing(H,5);
      const pt=basis==='swingh'?sw.high:sw.low;
      if(!pt)return null;
      return{p:pt.price,d:pt.t};
    }
    if(H.length>=2)return{p:+H[H.length-2].c,d:lastT};
    return{p:+H[H.length-1].o,d:lastT};
  };
  const [dateStr,setDateStr]=useState(new Date().toISOString().slice(0,10));
  const [tool,setTool]=useState('chart');
  const [sbOpen,setSbOpen]=useState(true);
  const [collapsed,setCollapsed]=useState(()=>{const o={};TOOLS.forEach(g=>{if(g.group!=='Overview')o[g.group]=true;});return o;});
  const [data,setData]=useState(null);
  const dt=useMemo(()=>new Date(dateStr+'T12:00:00Z'),[dateStr]);
  const hist=useMemo(()=>{const hd=data&&data[ixKey]&&data[ixKey].history;return (hd&&hd.length)?hd:genDemoHistory(ixKey,ix.anchor);},[data,ixKey,ix]);
  const liveHist=!!(data&&data[ixKey]&&data[ixKey].history&&data[ixKey].history.length);
  const setAnchor=(p,dstr)=>{if(p!=null&&!isNaN(p))setPrice(+p);if(dstr)setDateStr(dstr);};
  const [fetching,setFetching]=useState(false);
  const [fetchErr,setFetchErr]=useState('');
  const doFetchLive=async(key)=>{const k=key||ixKey;setFetching(true);setFetchErr('');
    try{const q=await fetchYahoo(INDICES[k].yahoo);setData(d=>Object.assign({},d||{},{[k]:q}));}
    catch(e){setFetchErr('live blocked');}finally{setFetching(false);}};
  useEffect(()=>{const hd=data&&data[ixKey]&&data[ixKey].history;if(!(hd&&hd.length))doFetchLive(ixKey);},[ixKey]);

  useEffect(()=>{fetch('./data.json').then(r=>r.ok?r.json():null).then(j=>{if(j)setData(j);}).catch(()=>{});},[]);
  // when index/date-basis changes, resolve price from history (live if loaded, else demo) else anchor placeholder
  useEffect(()=>{
    if(anchorBasis==='manual')return;
    const a=anchorFromHist(anchorBasis,hist);
    if(a){setPrice(a.p);setDateStr(a.d);}

        </optgroup>
      </select></Field>
      <Field label="Anchor price"><div style={{display:'flex',gap:4,alignItems:'center'}}>
        <input type="number" value={price} step="any" style={{width:'96px'}} onChange={e=>{setAnchorBasis('manual');setPrice(parseFloat(e.target.value));}}/>
        <select value={anchorBasis} onChange={e=>setAnchorBasis(e.target.value)} title="Anchor point source" style={{width:'168px'}}>
          <option value="manual">Manual</option>
          <option value="prevclose">Prev Close</option>
          <option value="open">Today Open</option>
          <option value="pdh">Prev Day High</option>
          <option value="pdl">Prev Day Low</option>
          <option value="pwh">Prev Week High</option>
          <option value="pwl">Prev Week Low</option>
          <option value="pmh">Prev Month High</option>
          <option value="pml">Prev Month Low</option>
          <option value="pqh">Prev Quarter High</option>
          <option value="pql">Prev Quarter Low</option>
          <option value="pyh">Prev Year High</option>
          <option value="pyl">Prev Year Low</option>
          <option value="swingh">Major Swing High</option>
          <option value="swingl">Major Swing Low</option>
        </select>
      </div></Field>
      <Field label="Date"><input type="date" value={dateStr} onChange={e=>setDateStr(e.target.value)}/></Field>
      <button className="btn sm" onClick={()=>setDateStr(new Date().toISOString().slice(0,10))}>Today</button>
      <button className="btn sm" onClick={()=>doFetchLive()} disabled={fetching} title="Fetch live OHLC from Yahoo via CORS proxy">{fetching?'… fetching':'⟳ Fetch live'}</button>
      <label className="btn sm" style={{cursor:'pointer'}} title="Load data.json (fetch_data.py) or an OHLC CSV">Load data / CSV<input type="file" accept=".json,.csv,application/json,text/csv" style={{display:'none'}} onChange={onFile}/></label>
      <div className="datasrc"><span className={'led'+(live?' live':'')}></span>{fetching?'FETCHING…':live?'LIVE':'MANUAL'}{fetchErr?<span className="neg" style={{marginLeft:6}}>{fetchErr}</span>:null}</div>
    </div>
    <div className="main" style={{position:'relative'}}>
      <div className={'sidebar'+(sbOpen?'':' hidden')}>
        {TOOLS.map(g=><div className="sb-group" key={g.group}>
          <div className="sb-title" style={{cursor:'pointer'}} onClick={()=>setCollapsed(c=>Object.assign({},c,{[g.group]:!c[g.group]}))}><span className="chev">{collapsed[g.group]?'▸':'▾'}</span>{g.group}<span className="grpcount">{g.items.length}</span></div>
          {!collapsed[g.group]&&g.items.map(it=><div key={it.id} className={'sb-item'+(tool===it.id?' active':'')} onClick={()=>setTool(it.id)}>
            <span className="ic">{it.ic}</span>{it.name}</div>)}
        </div>)}
        <div className="note" style={{padding:'10px 14px'}}>Anchor &amp; date in the top bar drive every tool.</div>
      </div>
      {!sbOpen&&<div className="reopen" onClick={()=>setSbOpen(true)}>▶ TOOLS</div>}
      <div className="content">{renderTool()}</div>
    </div>
  </div>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
